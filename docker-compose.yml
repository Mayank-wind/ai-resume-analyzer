
services:
  postgres:
    image: postgres:16
    container_name: ai-resume-postgres
    environment:
      POSTGRES_DB: ai_resume_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: ai-resume-app
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ai_resume_analyzer
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8080"

volumes:
  postgres_data:

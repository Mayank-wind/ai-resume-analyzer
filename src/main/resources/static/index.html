<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">
    <header class="hero">
        <h1>AI Resume Analyzer</h1>
        <p>Upload resumes, analyze them with AI, and track results.</p>
    </header>

    <section class="card">
        <h2>Backend Status</h2>
        <button id="healthBtn">Check Backend</button>
        <p id="healthResult">Not checked yet</p>
    </section>

    <section class="grid">
        <div class="card">
            <h2>Register</h2>
            <form id="registerForm">
                <input type="text" id="registerName" placeholder="Full Name" required />
                <input type="email" id="registerEmail" placeholder="Email" required />
                <input type="password" id="registerPassword" placeholder="Password" required />
                <button type="submit">Register</button>
            </form>
            <p id="registerResult"></p>
        </div>

        <div class="card">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
            <p id="loginResult"></p>
        </div>
    </section>

    <section class="card">
        <h2>Session</h2>
        <p><strong>Token Status:</strong> <span id="tokenStatus">No token saved</span></p>
        <button id="logoutBtn">Logout</button>
    </section>

    <section class="card">
        <h2>Upload Resume</h2>
        <form id="uploadForm">
            <input type="file" id="resumeFile" accept=".pdf" required />
            <textarea id="jobDescription" placeholder="Paste job description here..." rows="6"></textarea>
            <button type="submit">Upload and Analyze</button>
        </form>
        <p id="uploadResult"></p>
    </section>

    <section class="card">
        <h2>Analysis Result</h2>
        <div id="analysisResult" class="analysis-box">
            <p>No analysis yet.</p>
        </div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
